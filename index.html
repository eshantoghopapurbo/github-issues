<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- link fav logo and  title name  -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <title>GitHub Issues Tracker</title>
    <!-- link fontawosme for icon  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- link font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- link tailwin and daisyUI link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link css  -->
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <!-- log in section -->
    <section
      class="w-11/12 sm:w-9/12 lg:w-6/12 mx-auto bg-[#f5f4f4] my-[75px] shadow-md rounded-xl p-[32px]"
    >
      <section>
        <div class="flex justify-center items-center">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <div class="text-center my-[24px]">
          <h1 class="text-[24px] font-semibold">GitHub Issues Tracker</h1>
          <p class="text-[16px] text-[#64748B]">
            Sign in to manage your issues
          </p>
        </div>
        <fieldset class="fieldset">
          <label class="text-[22px]" for="username">Username</label>
          <input
            type="text"
            class="input-xl rounded-md bg-white py-[10px] border-[#E4E4E7]"
            id="username"
            placeholder="  Enter Username"
          />
          <label class="text-[22px]" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="input-xl rounded-sm py-[10px] bg-white border-[#E4E4E7]"
            placeholder="  Enter Password"
          />
          <button
            onclick="login()"
            id="login-btn"
            class="btn text-[16px] font-semibold btn-primary mt-4"
          >
            Sign In
          </button>
        </fieldset>
        <div class="divider mt-[24px] text-[16px]">OR</div>
        <div class="text-center">
          <p class="text-[#64748B] text-[14px] mb-[32px] mt-[24px]">
            Demo Credentials:
          </p>
          <p class="text-[16px] font-semibold">
            Username: <span class="text-[16px] font-normal">admin</span>
          </p>
          <p class="text-[16px] font-semibold">
            Password: <span class="text-[16px] font-normal">admin123</span>
          </p>
        </div>
      </section>
    </section>
    <script src="./script/index.js"></script>
  </body>
</html>
